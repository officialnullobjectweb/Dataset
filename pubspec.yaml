name: beatflow
version: 0.1.0+1
description: BeatFlow - Hybrid offline/online music player scaffold.
publish_to: 'none'

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.7
  just_audio: ^0.9.42
  audio_session: ^0.1.21
  dio: ^5.7.0
  dynamic_color: ^1.7.0
  palette_generator: ^0.3.3+5
  shared_preferences: ^2.3.2
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
